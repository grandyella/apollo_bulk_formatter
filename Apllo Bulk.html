<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM Disbursement Tool Pro v1.6</title>
    <style>
        :root { --primary-green: #27ae60; --dark-blue: #2c3e50; --bg-light: #f4f7f6; --accent-orange: #f39c12; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 20px; background-color: var(--bg-light); color: #333; }
        .container { max-width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: var(--dark-blue); border-left: 5px solid var(--primary-green); padding-left: 15px; margin-top: 0; margin-bottom: 20px; }
        
        .dashboard { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .global-config { flex: 1; min-width: 300px; background: #fff9f0; padding: 15px; border-radius: 8px; border: 1px solid #ffeaa7; display: flex; align-items: center; gap: 15px; }
        .global-config label { font-weight: bold; color: var(--accent-orange); font-size: 12px; }
        .global-config input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; width: 140px; text-align: center; }

        .summary-card { flex: 1; min-width: 300px; background: var(--dark-blue); color: white; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .summary-card small { font-size: 11px; opacity: 0.8; text-transform: uppercase; display: block; }
        .summary-card span { font-size: 22px; font-weight: bold; color: #2ecc71; }

        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-bottom: 25px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 10px; margin-bottom: 4px; color: #555; text-transform: uppercase; background: #eee; padding: 3px 8px; border-radius: 4px; width: fit-content; }
        textarea { height: 110px; padding: 8px; border: 1px solid #cbd5e0; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 11px; resize: none; transition: 0.2s; }
        textarea:focus { border-color: var(--primary-green); outline: none; background: #fdfdfd; }

        .actions { display: flex; gap: 12px; align-items: center; border-top: 1px solid #eee; padding-top: 20px; margin-bottom: 15px; }
        button { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; }
        .btn-copy { background: var(--primary-green); box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3); }
        .btn-reset { background: #e74c3c; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .tx-status { margin-left: auto; font-weight: bold; color: var(--dark-blue); }

        .table-wrapper { overflow-x: auto; max-height: 400px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; white-space: nowrap; }
        th { background: #f1f4f6; color: var(--dark-blue); padding: 10px; text-align: left; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #bdc3c7; }
        td { border-bottom: 1px solid #eee; padding: 8px; }
        tr:nth-child(even) { background: #fafafa; }
        .caps { text-transform: uppercase; font-weight: bold; }
        footer { margin-top: 20px; text-align: center; font-size: 11px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h2>Apollo Bulk Formatter</h2>

    <div class="dashboard">
        <div class="global-config">
            <label>PAYMENT DATE:</label>
            <input type="text" id="global_pay_date" placeholder="DD/MM/YYYY" oninput="autoProcess()">
        </div>
        <div class="summary-card">
            <div><small>Grand Total Amount</small></div>
            <div id="grandTotalDisplay">IDR 0</div>
        </div>
    </div>

    <div class="input-grid">
        <div class="input-group"><label>1. Amount</label><textarea id="in_amt" oninput="autoProcess()"></textarea></div>
        <div class="input-group"><label>2. Category</label><textarea id="in_cat" oninput="autoProcess()"></textarea></div>
        <div class="input-group"><label>3. Vendor Name</label><textarea id="in_vname" oninput="autoProcess()"></textarea></div>
        <div class="input-group"><label>4. Vendor Email</label><textarea id="in_vemail" oninput="autoProcess()"></textarea></div>
        <div class="input-group"><label>5. Bank Code</label><textarea id="in_bank" oninput="autoProcess()"></textarea></div>
        <div class="input-group"><label>6. Account Number</label><textarea id="in_rek" oninput="autoProcess()"></textarea></div>
        <div class="input-group"><label>7. Invoice Date</label><textarea id="in_date" oninput="autoProcess()"></textarea></div>
        <div class="input-group"><label>8. Description</label><textarea id="in_desc" oninput="autoProcess()"></textarea></div>
    </div>

    <div class="actions">
        <button class="btn-copy" onclick="copyDataOnly()">SALIN DATA (TANPA NO & HEADER) 📋</button>
        <button class="btn-reset" onclick="resetAll()">RESET SEMUA</button>
        <div class="tx-status" id="statusInfo">0 Transaksi Terdeteksi</div>
    </div>

    <div class="table-wrapper">
        <table id="disbursementTable">
            <thead>
                <tr>
                    <th>No</th><th>Amount</th><th>Category</th><th>Vendor Name</th><th>Vendor Email</th><th>Bank Code</th><th>Account Number</th><th>Account Holder Name</th><th>Invoice Date</th><th>Payment Date</th><th>Description</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <footer>Made With ❤️ Ahmad Zulfikar T</footer>
</div>

<script>
    window.onload = function() {
        const today = new Date();
        document.getElementById('global_pay_date').value = `${String(today.getDate()).padStart(2, '0')}/${String(today.getMonth() + 1).padStart(2, '0')}/${today.getFullYear()}`;
    };

    function formatToDMY(dateStr) {
        if (!dateStr) return "";
        let cleanDate = dateStr.trim().replace(/\//g, '-');
        let parts = cleanDate.split('-');
        if (parts.length === 3 && parts[0].length <= 2 && parts[2].length === 4) {
            return `${parts[0].padStart(2, '0')}/${parts[1].padStart(2, '0')}/${parts[2]}`;
        }
        let d = new Date(cleanDate);
        if (!isNaN(d.getTime())) {
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
        }
        return dateStr;
    }

    function autoProcess() {
        const amt = document.getElementById('in_amt').value.trim().split('\n');
        const cat = document.getElementById('in_cat').value.trim().split('\n');
        const vname = document.getElementById('in_vname').value.trim().split('\n');
        const vemail = document.getElementById('in_vemail').value.trim().split('\n');
        const bank = document.getElementById('in_bank').value.trim().split('\n');
        const rek = document.getElementById('in_rek').value.trim().split('\n');
        const date = document.getElementById('in_date').value.trim().split('\n');
        const desc = document.getElementById('in_desc').value.trim().split('\n');
        const globalPayDate = formatToDMY(document.getElementById('global_pay_date').value);

        const maxRows = Math.max(amt.length, vname.length, rek.length);
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        
        let count = 0;
        let totalAmount = 0;

        for (let i = 0; i < maxRows; i++) {
            if (!amt[i] && !vname[i]) continue;
            count++;
            
            const numValue = amt[i] ? parseInt(amt[i].replace(/[^0-9]/g, '')) || 0 : 0;
            totalAmount += numValue;
            
            const upperVendor = (vname[i] || "").trim().toUpperCase();
            const cleanBank = bank[i] ? bank[i].toUpperCase().trim() : "";

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color:#999; text-align: center;">${count}</td>
                <td>${numValue}</td>
                <td>${(cat[i] || "").trim()}</td>
                <td class="caps">${upperVendor}</td>
                <td>${(vemail[i] || "").trim()}</td>
                <td><strong>${cleanBank}</strong></td>
                <td>${(rek[i] || "").trim()}</td>
                <td class="caps">${upperVendor}</td>
                <td>${formatToDMY(date[i])}</td>
                <td>${globalPayDate}</td>
                <td>${(desc[i] || "").trim()}</td>
            `;
            tbody.appendChild(tr);
        }
        
        document.getElementById('grandTotalDisplay').innerText = "IDR " + totalAmount.toLocaleString('id-ID');
        document.getElementById('statusInfo').innerText = `${count} Transaksi Terdeteksi`;
    }

    function copyDataOnly() {
        const tbody = document.getElementById('tableBody');
        const rows = tbody.querySelectorAll('tr');
        let text = "";

        if (rows.length === 0) {
            alert("Tidak ada data untuk disalin!");
            return;
        }

        rows.forEach(row => {
            const cells = row.querySelectorAll('td');
            let rowData = [];
            // J=1 Berarti melewati Kolom "No" (Indeks 0)
            // Hasil salinan dimulai langsung dari Kolom "Amount" (Indeks 1)
            for (let j = 1; j < cells.length; j++) {
                rowData.push(cells[j].innerText);
            }
            text += rowData.join("\t") + "\n";
        });

        const dummy = document.createElement("textarea");
        document.body.appendChild(dummy);
        dummy.value = text;
        dummy.select();
        document.execCommand("copy");
        document.body.removeChild(dummy);
        alert("BERHASIL!\nData tersalin tanpa Header dan tanpa kolom No.");
    }

    function resetAll() {
        if(confirm("Hapus semua data?")) {
            ['in_amt','in_cat','in_vname','in_vemail','in_bank','in_rek','in_date','in_desc'].forEach(id => document.getElementById(id).value = "");
            autoProcess();
        }
    }
</script>
</body>
</html>
